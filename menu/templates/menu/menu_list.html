<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">

        <a class="navbar-brand" href="/menu/">
            Food Ordering System
        </a>

        <div>

            <a class="btn btn-light me-2" href="/menu/cart/">
                Cart
            </a>

            <a class="btn btn-warning me-2" href="/menu/orders/">
                My Orders
            </a>

            {% if user.is_authenticated %}
                <span class="text-white me-2">
                    Welcome, {{ user.username }}
                </span>

                <a class="btn btn-danger" href="/menu/logout/">
                    Logout
                </a>
            {% else %}
                <a class="btn btn-success" href="/menu/login/">
                    Login
                </a>
            {% endif %}

        </div>

    </div>
</nav>
    <title>Food Menu</title>

</head>

<body class="container mt-4">


<h1>Food Menu</h1>

<form method="GET">

    <input
    type="text"
    name="q"
    value="{{ request.GET.q }}"
    placeholder="Search food..."
    >

    <button type="submit">
        Search
    </button>

</form>

<br><br>

<hr>

<div class="row">

{% for food in foods %}

<div class="col-md-4">

    <div class="card mb-4 shadow">

        {% if food.image %}
            <img src="{{ food.image.url }}"
                 class="card-img-top"
                 style="height:200px; object-fit:cover;">
        {% endif %}

        <div class="card-body">

            <h5 class="card-title">
                {{ food.name }}
            </h5>

            <p class="card-text">
                ₹{{ food.price }}
            </p>

            <a href="{% url 'add_to_cart' food.id %}"
               class="btn btn-primary">
                Add to Cart
            </a>

        </div>

    </div>

</div>

{% endfor %}

</div>

<a href="{% url 'cart' %}">
    View Cart
</a>
<br>
<br>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
