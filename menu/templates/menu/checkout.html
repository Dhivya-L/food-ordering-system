<!DOCTYPE html>
<html>
<head>
    <title>Checkout</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>
{% include "menu/navbar.html" %}

<div class="container mt-5">

<h2 class="mb-4 text-center">
    Checkout
</h2>

<form method="POST"
      action="{% url 'place_order' %}"
      class="card p-4 shadow">

{% csrf_token %}

<h4 class="mb-3">
    Customer Information
</h4>

<div class="mb-3">

    <label class="form-label">
        Name
    </label>

    <input type="text"
           class="form-control"
           value="{{ request.user.username }}"
           readonly>

</div>

<div class="mb-3">

    <label class="form-label">
        Email
    </label>

    <input type="email"
           class="form-control"
           value="{{ request.user.email }}"
           readonly>

</div>

<hr>

<h4 class="mb-3">
    Payment Method
</h4>

<div class="form-check">

    <input class="form-check-input"
           type="radio"
           name="payment_method"
           value="Cash"
           checked>

    <label class="form-check-label">
        Cash on Delivery
    </label>

</div>

<div class="form-check">

    <input class="form-check-input"
           type="radio"
           name="payment_method"
           value="UPI">

    <label class="form-check-label">
        UPI
    </label>

</div>

<div class="form-check mb-3">

    <input class="form-check-input"
           type="radio"
           name="payment_method"
           value="Card">

    <label class="form-check-label">
        Card
    </label>

</div>

<hr>

<h4 class="mb-3">
    Order Summary
</h4>

<h5 class="text-success">
    Total Amount: ₹{{ total }}
</h5>

<button type="submit"
        class="btn btn-success w-100 mt-3">

    Place Order

</button>

</form>

<br>

<a href="{% url 'cart' %}"
   class="btn btn-secondary">

    Back to Cart

</a>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
